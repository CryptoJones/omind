<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>omind · memory catalog</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Fraunces', 'Georgia', 'serif'],
            body: ['Newsreader', 'Georgia', 'serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            paper: { DEFAULT: '#f1e7d2', 100: '#f6eede', 200: '#ebdfc4', 300: '#e0d0ad', card: '#f8f1e2' },
            ink: { DEFAULT: '#241f18', soft: '#544a3b', faint: '#9a8b72' },
            stamp: { DEFAULT: '#b23a2e', dark: '#8e2b21', light: '#c9594c' },
            rule: '#d8c39c',
          },
        },
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="app.css" />
</head>

<body class="h-full bg-paper font-body text-ink">
  <div class="paper-grain"></div>

  <div class="relative flex h-full flex-col">
    <!-- Drawer label / masthead -->
    <header class="flex items-end justify-between border-b-2 border-ink/80 px-5 pb-2 pt-3">
      <div class="flex items-end gap-4">
        <h1 class="font-display text-3xl font-semibold leading-none tracking-tight">
          <span class="text-stamp">om</span><span>ind</span>
        </h1>
        <p class="mb-0.5 font-mono text-[10px] uppercase tracking-[0.28em] text-ink-faint">
          Open&nbsp;Mind&nbsp;Interface<br />Memory&nbsp;Catalog
        </p>
      </div>
      <div class="flex items-center gap-4">
        <span id="folder-path" class="hidden font-mono text-[10px] tracking-tight text-ink-faint md:inline"></span>
        <button id="new-btn" class="stamp-btn" type="button">+ New&nbsp;Card</button>
      </div>
    </header>

    <div class="flex min-h-0 flex-1">
      <!-- Catalog drawer -->
      <aside class="flex w-80 flex-col border-r-2 border-ink/15 bg-paper-100">
        <div class="border-b border-rule px-4 py-3">
          <div class="catalog-search">
            <span class="font-mono text-xs text-ink-faint">⌕</span>
            <input id="search" type="search" autocomplete="off" placeholder="search the catalog…"
              class="w-full bg-transparent font-mono text-xs tracking-tight text-ink placeholder-ink-faint focus:outline-none" />
          </div>
          <div id="tag-bar" class="mt-3 flex flex-wrap gap-1.5"></div>
        </div>
        <ul id="note-list" class="flex-1 space-y-2 overflow-y-auto px-3 py-3"></ul>
        <div class="flex items-center justify-between border-t border-rule px-4 py-2 font-mono text-[10px] uppercase tracking-[0.2em] text-ink-faint">
          <span id="note-count">—</span>
          <span>est. 2026</span>
        </div>
      </aside>

      <!-- The card on the table -->
      <main id="content" class="min-w-0 flex-1 overflow-y-auto px-8 py-8"></main>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
