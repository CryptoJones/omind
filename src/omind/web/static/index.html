<html lang="en" dir="ltr" class="h-full" data-theme="midnight">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>omind</title>

  <!-- Apply saved theme + language before paint to avoid a flash of defaults. -->
  <script>
    (function () {
      try {
        var el = document.documentElement;
        var th = localStorage.getItem("omind-theme");
        if (th) el.setAttribute("data-theme", th);
        var lg = localStorage.getItem("omind-lang");
        if (lg) {
          el.setAttribute("lang", lg);
          el.setAttribute("dir", lg === "ar" ? "rtl" : "ltr");
        }
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bricolage Grotesque"', 'system-ui', 'sans-serif'],
            body: ['Newsreader', 'Georgia', 'serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            paper: { DEFAULT: 'var(--bg)', 100: 'var(--bg-elev)', card: 'var(--surface)' },
            ink: { DEFAULT: 'var(--text)', soft: 'var(--text-soft)', faint: 'var(--text-faint)' },
            stamp: 'var(--accent)',
            rule: 'var(--border)',
          },
        },
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="app.css" />
</head>

<body class="h-full bg-paper font-body text-ink">
  <div class="app-glow"></div>

  <div class="relative flex h-full flex-col">
    <header class="masthead flex items-center justify-between gap-4 px-6 py-3">
      <div class="flex items-baseline gap-3">
        <h1 class="font-display text-2xl font-extrabold leading-none tracking-tight">
          <span class="text-stamp">om</span><span>ind</span>
        </h1>
        <p id="tagline" class="hidden font-mono text-[10px] uppercase tracking-[0.24em] text-ink-faint sm:block">
          memory
        </p>
      </div>

      <div class="flex items-center gap-5">
        <span id="folder-path" class="hidden font-mono text-[10px] tracking-tight text-ink-faint lg:inline"></span>
        <div id="theme-picker" class="flex items-center gap-1.5" title="Theme">
          <button class="swatch" data-theme="midnight" aria-label="Midnight theme"></button>
          <button class="swatch" data-theme="carbon" aria-label="Carbon theme"></button>
          <button class="swatch" data-theme="dusk" aria-label="Dusk theme"></button>
          <button class="swatch" data-theme="paper" aria-label="Paper theme"></button>
          <button class="swatch" data-theme="mint" aria-label="Mint theme"></button>
        </div>
        <select id="lang-select" class="lang-select" aria-label="Language"></select>
        <button id="new-btn" class="btn btn-primary" type="button">+ New</button>
      </div>
    </header>

    <div class="flex min-h-0 flex-1">
      <aside class="sidebar flex w-80 flex-col">
        <div class="border-b border-rule px-4 py-3">
          <div class="catalog-search">
            <span class="search-icon font-mono">⌕</span>
            <input id="search" type="search" autocomplete="off" placeholder="search…"
              class="w-full bg-transparent font-mono text-xs tracking-tight text-ink placeholder-ink-faint focus:outline-none" />
          </div>
          <div id="tag-bar" class="mt-3 flex flex-wrap gap-1.5"></div>
        </div>
        <ul id="note-list" class="flex-1 space-y-1.5 overflow-y-auto px-3 py-3"></ul>
        <div class="flex items-center justify-between border-t border-rule px-4 py-2 font-mono text-[10px] uppercase tracking-[0.18em] text-ink-faint">
          <span id="note-count">—</span>
          <span class="opacity-70">omind</span>
        </div>
      </aside>

      <main id="content" class="min-w-0 flex-1 overflow-y-auto px-8 py-8"></main>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
