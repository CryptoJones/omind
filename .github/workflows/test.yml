name: ci
on:
  pull_request:
  push:
    branches: [main]

# Least privilege: jobs only read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        # Windows and macOS are supported deploy platforms (filelock shim /
        # .cmd-shim resolution on Windows; BSD userland, case-insensitive FS and
        # the ~/.local/bin PATH behavior on macOS). Exercise the oldest and
        # newest Python on each so platform-specific breakage can't ship green.
        include:
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      # setuptools too: the windows-latest Python 3.10 toolcache bundles a
      # vulnerable 65.5.0 that pip-audit (rightly) flags.
      - run: python -m pip install -U pip setuptools
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: mypy src
      - run: pip-audit
      - run: pytest -v --cov=omind --cov-report=term-missing

  wheel:
    # CI otherwise only installs editable (`pip install -e`), so hatchling's
    # wheel file-selection is never exercised — a change that drops the hook
    # .sh/.js scripts or the web/static assets from the package would ship green
    # and crash `importlib.resources` on installed nodes. Build the real wheel,
    # install it non-editable, and assert the packaged data files are present.
    name: Wheel build + install smoke test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - run: python -m pip install -U pip build
      - name: Build the wheel
        run: python -m build --wheel
      - name: Install the built wheel (not editable)
        run: pip install dist/*.whl
      - name: Smoke test the CLI and the packaged data files
        run: |
          omind --version
          python - <<'PY'
          from importlib.resources import files

          root = files("omind")

          def res(*parts):
              p = root
              for part in parts:
                  p = p / part
              return p

          required = [
              ("omi-guard.sh",),
              ("omi-guard-hermes.sh",),
              ("omi-gate-reset.sh",),
              ("secret-output-guard.sh",),
              ("git-fresh-base.sh",),
              ("fleet-sudo.sh",),
              ("omi-guard.opencode.js",),
              ("_omi_enforce.py",),
              ("web", "static", "app.js"),
              ("web", "static", "graph.js"),
          ]
          missing = ["/".join(parts) for parts in required if not res(*parts).is_file()]
          fonts = [f for f in res("web", "static", "vendor", "fonts").iterdir()]
          assert not missing, f"wheel is missing packaged data files: {missing}"
          assert fonts, "wheel is missing web/static/vendor/fonts"
          print(f"OK: {len(required)} data files + {len(fonts)} fonts present in the wheel")
          PY

  secrets:
    name: Secret scan (gitleaks, full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0  # gitleaks scans history
      - name: gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            --entrypoint sh ghcr.io/gitleaks/gitleaks:v8.30.1 \
            -c "git config --global --add safe.directory /repo && \
                gitleaks git --redact --verbose /repo"

  conformance:
    name: MCP conformance (live stdio)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Conformance suite
        # mcp-conformance is a private repo, so this job is a graceful no-op until
        # MCP_CONFORMANCE_TOKEN (a PAT with read access to it) is set in the repo's
        # Actions secrets. Then it boots `omind node` over stdio against a throwaway
        # vault and asserts the baseline contracts (see conformance.toml).
        env:
          MCP_CONFORMANCE_TOKEN: ${{ secrets.MCP_CONFORMANCE_TOKEN }}
        run: |
          if [ -z "$MCP_CONFORMANCE_TOKEN" ]; then
            echo "MCP_CONFORMANCE_TOKEN not set — skipping conformance suite."
            exit 0
          fi
          python -m venv .venv
          .venv/bin/pip install -U pip
          .venv/bin/pip install -e .
          # The token is set but may be expired or lack access to the private
          # repo. Treat a failed clone/install as a skip, not a hard CI failure —
          # this job is a graceful no-op until a working token is wired up, and
          # an expired PAT shouldn't turn the whole build red.
          if ! .venv/bin/pip install "git+https://x-access-token:${MCP_CONFORMANCE_TOKEN}@github.com/CryptoJones/mcp-conformance.git"; then
            echo "::warning::Could not install mcp-conformance (token expired or no access?) — skipping conformance suite."
            exit 0
          fi
          mkdir -p ./.conformance-vault/OMI
          .venv/bin/mcp-conformance run -- -q

# Actions pinned by commit SHA; kept current by Dependabot (.github/dependabot.yml).
