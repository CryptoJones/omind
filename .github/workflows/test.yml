name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        # Windows is a supported platform (filelock shim, .cmd-shim
        # resolution); exercise the oldest and newest Python there.
        include:
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -U pip
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: mypy src
      - run: pip-audit
      - run: pytest -v
