name: ci
on:
  pull_request:
  push:
    branches: [main]

# Least privilege: jobs only read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        # Windows is a supported platform (filelock shim, .cmd-shim
        # resolution); exercise the oldest and newest Python there.
        include:
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      # setuptools too: the windows-latest Python 3.10 toolcache bundles a
      # vulnerable 65.5.0 that pip-audit (rightly) flags.
      - run: python -m pip install -U pip setuptools
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: mypy src
      - run: pip-audit
      - run: pytest -v --cov=omind --cov-report=term-missing

  secrets:
    name: Secret scan (gitleaks, full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # gitleaks scans history
      - name: gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            --entrypoint sh ghcr.io/gitleaks/gitleaks:v8.30.1 \
            -c "git config --global --add safe.directory /repo && \
                gitleaks git --redact --verbose /repo"

  conformance:
    name: MCP conformance (live stdio)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Conformance suite
        # mcp-conformance is a private repo, so this job is a graceful no-op until
        # MCP_CONFORMANCE_TOKEN (a PAT with read access to it) is set in the repo's
        # Actions secrets. Then it boots `omind node` over stdio against a throwaway
        # vault and asserts the baseline contracts (see conformance.toml).
        env:
          MCP_CONFORMANCE_TOKEN: ${{ secrets.MCP_CONFORMANCE_TOKEN }}
        run: |
          if [ -z "$MCP_CONFORMANCE_TOKEN" ]; then
            echo "MCP_CONFORMANCE_TOKEN not set — skipping conformance suite."
            exit 0
          fi
          python -m venv .venv
          .venv/bin/pip install -U pip
          .venv/bin/pip install -e .
          .venv/bin/pip install "git+https://x-access-token:${MCP_CONFORMANCE_TOKEN}@github.com/CryptoJones/mcp-conformance.git"
          mkdir -p ./.conformance-vault/OMI
          .venv/bin/mcp-conformance run -- -q

# Actions pinned by commit SHA; kept current by Dependabot (.github/dependabot.yml).
