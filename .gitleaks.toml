# gitleaks config. Uses the default rule set; allowlists obvious test fixtures
# and the generated mesh node-id/backup-password placeholders so CI stays signal,
# not noise. omind has no committed credentials: backup passwords and node IDs
# are generated at runtime with `secrets.token_*` and written outside the repo.
title = "omind gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Test/e2e fixtures and docs use obvious fake tokens/paths."
paths = [
  '''tests/.*''',
  '''docs/.*''',
  # The e2e harness reads provider keys from the environment at runtime; it
  # commits no secrets. gitleaks' generic-api-key rule false-positives on the
  # high-entropy env-var NAME in runpod_api_key()'s docstring (e2e/providers.py).
  '''e2e/.*''',
]
